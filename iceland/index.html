<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Iceland · 30 Jun – 5 Jul 2026</title>
<meta name="description" content="Self-drive Iceland trip — tap a day to see its stops on the map." />
<meta name="theme-color" content="#eef1f0" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Iceland" />

<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
<link rel="preconnect" href="https://a.basemaps.cartocdn.com" crossorigin />
<link rel="preconnect" href="https://b.basemaps.cartocdn.com" crossorigin />
<link rel="preconnect" href="https://c.basemaps.cartocdn.com" crossorigin />
<link rel="preconnect" href="https://d.basemaps.cartocdn.com" crossorigin />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css"
  integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />

<style>
  :root{
    --paper:#eef1f0;          /* app + landing background (light) */
    --surface:#ffffff;
    --ink:#16242a;
    --muted:#5d6f74;
    --faint:#8a9ca0;
    --line:#e2e8e7;           /* hairline divider */
    --line-2:#d3dcdb;         /* control borders */
    --chip:#eef2f2;           /* subtle chip background */
    --accent:#0e7c86;
    --hot:#c2562e;
    --hot-soft:#f6e7df;
    /* per-day hues */
    --d1:#0e7c86; --d2:#4c9a2a; --d3:#1f6fb2; --d4:#8049b0; --d5:#d1495b; --d6:#64748b;
    --sh-1:0 1px 2px rgba(22,36,42,.07), 0 1px 3px rgba(22,36,42,.05);
    --sh-2:0 2px 8px rgba(22,36,42,.10), 0 1px 3px rgba(22,36,42,.05);
    --r-sm:8px; --r-md:12px; --r-lg:16px;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,Roboto,Helvetica,Arial,sans-serif;
    --mono:ui-monospace,SFMono-Regular,"SF Mono",Menlo,Consolas,monospace;
    --sat:env(safe-area-inset-top,0px);
    --sab:env(safe-area-inset-bottom,0px);
    --sal:env(safe-area-inset-left,0px);
    --sar:env(safe-area-inset-right,0px);
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;font-family:var(--sans);color:var(--ink);background:var(--paper);
    -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;
    overscroll-behavior:none;
  }
  button{font-family:inherit;}
  a{color:var(--accent);}
  :focus-visible{outline:2.5px solid var(--accent);outline-offset:2px;border-radius:6px;}

  /* ---------- MAP ---------- */
  #map{position:fixed;inset:0;z-index:0;background:#aadaff;}
  .leaflet-container{font-family:var(--sans);background:#dfe9ea;}
  .leaflet-control-zoom{margin-top:calc(var(--sat) + 64px)!important;margin-left:calc(var(--sal) + 12px)!important;border:1px solid var(--line)!important;box-shadow:var(--sh-2)!important;border-radius:var(--r-md)!important;overflow:hidden;}
  .leaflet-control-zoom a{width:44px!important;height:44px!important;line-height:44px!important;font-size:20px!important;color:var(--ink)!important;background:var(--surface)!important;}
  .leaflet-control-zoom a:hover{background:#f4f7f7!important;}
  /* lift attribution above the peeked bottom sheet (which covers ~36dvh) so OSM/CARTO credit stays visible & tappable */
  .leaflet-control-attribution{font-size:9.5px;background:rgba(255,255,255,.9);margin-bottom:calc(var(--sab) + 37dvh)!important;border-radius:0!important;}

  /* ---------- MARKERS ---------- */
  .pin{
    --c:var(--accent);
    width:26px;height:26px;border-radius:50%;
    background:var(--c);color:#fff;
    display:flex;align-items:center;justify-content:center;
    font-size:12.5px;font-weight:800;
    border:2.5px solid #fff;
    box-shadow:0 2px 6px rgba(0,0,0,.35);
    font-variant-numeric:tabular-nums;
  }
  .pin.is-stay{border-radius:8px;}
  .pin.is-stay::after{content:"";position:absolute;width:7px;height:7px;border-radius:50%;background:#fff;}
  .pin.is-stay span{display:none;}
  .pin.is-start{border-radius:8px;transform:rotate(45deg);}
  .pin.is-start span{transform:rotate(-45deg);font-size:11px;}
  .pin.is-skip{background:#fff;border:2px dashed #9aa6a9;color:#9aa6a9;box-shadow:0 1px 4px rgba(0,0,0,.2);opacity:.9;width:20px;height:20px;font-size:11px;}
  .pin.is-optional{border-style:dashed;border-color:#fff;box-shadow:0 1px 5px rgba(0,0,0,.3);opacity:.92;}
  .pin.is-anchor{box-shadow:0 0 0 4px rgba(194,86,46,.25),0 2px 7px rgba(0,0,0,.4);}
  .pin.is-anchor::before{
    content:"";position:absolute;inset:-7px;border-radius:50%;
    border:2px solid var(--hot);opacity:.0;
    animation:ring 1.8s ease-out infinite;
  }
  @keyframes ring{0%{transform:scale(.7);opacity:.7}70%{opacity:0}100%{transform:scale(1.5);opacity:0}}
  @media (prefers-reduced-motion:reduce){
    .pin.is-anchor::before{animation:none;opacity:.5}
    #sheet,#landing{transition:none!important;}
    .leaflet-fade-anim .leaflet-tile{transition:none!important;}
  }

  /* ---------- POPUP ---------- */
  .leaflet-popup-content-wrapper{border-radius:var(--r-md);box-shadow:0 6px 24px rgba(22,36,42,.20);}
  .leaflet-popup-content{margin:12px;line-height:1.4;}
  .pop-tag{font-size:10px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;}
  .pop-name{font-size:15px;font-weight:700;margin:4px 0;}
  .pop-meta{font-size:12.5px;color:var(--muted);font-variant-numeric:tabular-nums;}
  .pop-time{display:inline-block;margin-top:8px;font-family:var(--mono);font-size:11.5px;font-weight:700;color:var(--hot);background:var(--hot-soft);padding:4px 8px;border-radius:var(--r-sm);}
  .pop-dir{display:inline-block;margin-top:8px;font-size:12.5px;font-weight:700;text-decoration:none;}
  .pop-dir::after{content:" ↗";}

  /* ---------- LANDING ---------- */
  #landing{
    position:fixed;inset:0;z-index:1000;overflow-y:auto;-webkit-overflow-scrolling:touch;
    padding:calc(var(--sat) + 24px) calc(var(--sar) + 16px) calc(var(--sab) + 32px) calc(var(--sal) + 16px);
    background:var(--paper);color:var(--ink);
    transition:opacity .3s ease, transform .3s ease;
  }
  #landing.hidden{opacity:0;transform:translateY(-8px);pointer-events:none;}
  .land-wrap{max-width:540px;margin:0 auto;}
  h1{font-size:clamp(32px,11vw,48px);line-height:1.1;letter-spacing:-.015em;margin:0 0 8px;font-weight:700;color:var(--ink);text-wrap:balance;}
  .sub{font-size:13px;color:var(--muted);font-variant-numeric:tabular-nums;font-weight:500;}
  .sub b{color:var(--ink);font-weight:700;}

  .btns{display:flex;flex-direction:column;gap:8px;margin-top:16px;}
  .btn-all{
    display:flex;align-items:center;gap:12px;width:100%;text-align:left;cursor:pointer;
    background:var(--d1);color:#fff;border:none;min-height:44px;
    border-radius:var(--r-lg);padding:14px 16px;
    box-shadow:0 2px 8px rgba(14,124,134,.22);transition:transform .12s ease, box-shadow .2s ease;
  }
  .btn-all:active{transform:scale(.99);}
  .btn-all .ba-t{font-size:17px;font-weight:700;letter-spacing:-.01em;}

  .grid{display:grid;grid-template-columns:1fr;gap:8px;}
  @media(min-width:520px){.grid{grid-template-columns:1fr 1fr;}}
  .day-btn{
    display:flex;align-items:center;gap:12px;width:100%;text-align:left;cursor:pointer;
    background:var(--surface);border:1px solid var(--line);border-radius:var(--r-md);
    padding:12px 16px;color:var(--ink);box-shadow:var(--sh-1);min-height:44px;
    transition:transform .12s ease, box-shadow .2s ease;
  }
  .day-btn:active{transform:scale(.995);}
  .day-btn:hover{box-shadow:var(--sh-2);}
  .db-badge{flex:none;width:36px;height:36px;border-radius:50%;background:var(--c);color:#fff;
    display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;font-variant-numeric:tabular-nums;}
  .db-main{flex:1;min-width:0;}
  .db-title{display:block;font-size:15px;font-weight:700;letter-spacing:-.01em;color:var(--ink);text-wrap:balance;}
  .db-meta{margin-top:8px;display:flex;flex-wrap:wrap;gap:4px;font-size:11px;}
  .db-chev{flex:none;width:8px;height:8px;border-right:2px solid var(--line-2);border-top:2px solid var(--line-2);transform:rotate(45deg);}
  .chip{background:var(--chip);border-radius:var(--r-sm);padding:4px 8px;color:var(--muted);font-variant-numeric:tabular-nums;font-weight:500;}
  .chip.hot{background:var(--hot-soft);color:#6a3017;font-weight:700;}
  .land-foot{margin-top:24px;text-align:center;}
  .land-foot a{display:inline-flex;align-items:center;justify-content:center;min-height:44px;color:var(--d1);font-weight:700;font-size:13px;text-decoration:none;border:1px solid var(--line-2);background:var(--surface);border-radius:var(--r-md);padding:0 16px;box-shadow:var(--sh-1);}

  /* ---------- TOP BAR ---------- */
  #topbar{
    position:fixed;left:0;right:0;top:0;z-index:900;
    padding:calc(var(--sat) + 8px) calc(var(--sar) + 8px) 8px calc(var(--sal) + 8px);
    display:flex;flex-direction:column;gap:8px;pointer-events:none;
  }
  #topbar.hidden{display:none;}
  .tb-row{display:flex;align-items:center;gap:8px;pointer-events:auto;}
  .tb-home{
    flex:none;display:flex;align-items:center;justify-content:center;gap:8px;min-height:44px;
    background:var(--surface);border:1px solid var(--line);
    border-radius:var(--r-md);padding:0 14px;font-weight:700;font-size:13.5px;color:var(--ink);cursor:pointer;
    box-shadow:var(--sh-1);
  }
  .tb-home:active{transform:scale(.97);}
  .tb-home svg{width:16px;height:16px;}
  .tb-title{
    display:flex;flex-direction:column;justify-content:center;min-height:44px;
    background:var(--surface);border:1px solid var(--line);
    border-radius:var(--r-md);padding:0 14px;box-shadow:var(--sh-1);
    min-width:0;flex:1;
  }
  .tb-title .tt-1{font-size:10px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--c,#0e7c86);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .tb-title .tt-2{font-size:13px;font-weight:600;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .pills{
    display:flex;gap:8px;overflow-x:auto;pointer-events:auto;
    padding:4px 0;scrollbar-width:none;-webkit-overflow-scrolling:touch;scroll-snap-type:x proximity;
  }
  .pills::-webkit-scrollbar{display:none;}
  .pill{
    flex:none;border:1px solid var(--line-2);background:var(--surface);
    border-radius:var(--r-md);padding:0 14px;min-height:44px;font-size:13px;font-weight:700;color:var(--muted);cursor:pointer;
    box-shadow:var(--sh-1);white-space:nowrap;display:flex;align-items:center;gap:8px;scroll-snap-align:center;
  }
  .pill .dot{width:8px;height:8px;border-radius:50%;background:var(--c,#0e7c86);}
  .pill[aria-current="true"]{background:var(--c,#0e7c86);color:#fff;border-color:transparent;}
  .pill[aria-current="true"] .dot{background:#fff;}

  /* ---------- BOTTOM SHEET ---------- */
  #sheet{
    position:fixed;left:0;right:0;bottom:0;z-index:850;
    background:var(--surface);border-radius:var(--r-lg) var(--r-lg) 0 0;
    box-shadow:0 -1px 0 rgba(22,36,42,.05), 0 -8px 28px rgba(22,36,42,.13);
    display:flex;flex-direction:column;
    height:min(88vh,88dvh);
    transform:translateY(var(--sheet-y,58%));
    transition:transform .34s cubic-bezier(.32,.72,0,1);
    touch-action:none;will-change:transform;
    padding-bottom:var(--sab);
  }
  #sheet.hidden{display:none;}
  #sheet.dragging{transition:none;}
  .sheet-grip{padding:8px 0;display:flex;justify-content:center;align-items:center;cursor:grab;flex:none;touch-action:none;}
  .sheet-grip::before{content:"";width:36px;height:4px;border-radius:2px;background:#cfd8d7;}
  .sheet-head{flex:none;padding:0 16px 12px;border-bottom:1px solid var(--line);touch-action:none;cursor:grab;}
  #sheet.dragging .sheet-head,#sheet.dragging .sheet-grip{cursor:grabbing;}
  #noteSlot{touch-action:none;cursor:grab;}
  .sheet-head .navbtn{cursor:pointer;}
  .sh-row{display:flex;align-items:center;gap:12px;}
  .sh-titles{min-width:0;flex:1;}
  .sh-eyebrow{font-size:10.5px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--c,#0e7c86);}
  .sh-title{font-size:18px;font-weight:600;letter-spacing:-.01em;margin-top:4px;color:var(--ink);text-wrap:balance;}
  .sh-stats{margin-top:12px;display:flex;flex-wrap:wrap;gap:8px;}
  .stat{font-size:11px;color:var(--muted);background:var(--chip);border-radius:var(--r-sm);padding:4px 8px;font-variant-numeric:tabular-nums;}
  .stat b{color:var(--ink);text-transform:uppercase;font-size:9.5px;letter-spacing:.04em;margin-right:4px;font-weight:700;}
  .navbtn{
    flex:none;align-self:center;display:flex;align-items:center;justify-content:center;gap:8px;min-height:44px;
    background:var(--accent);color:#fff;border:none;border-radius:var(--r-md);padding:0 14px;
    font-size:13px;font-weight:700;cursor:pointer;text-decoration:none;white-space:nowrap;
    box-shadow:var(--sh-1);
  }
  .navbtn:active{transform:scale(.97);}
  .navbtn svg{width:15px;height:15px;}
  .navbtn[hidden]{display:none;}

  .note{
    margin:12px 16px 0;background:var(--hot-soft);border-radius:var(--r-md);padding:12px;
    font-size:13px;line-height:1.5;color:#5a2b14;text-wrap:pretty;
  }
  .note .nh{display:flex;align-items:center;gap:8px;font-size:10px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--hot);margin-bottom:4px;}
  .note .nh::before{content:"";width:7px;height:7px;border-radius:50%;background:var(--hot);}
  .note.plain{background:var(--chip);color:var(--ink);}
  .note.plain .nh{color:var(--accent);}
  .note.plain .nh::before{background:var(--accent);}

  .list{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:8px 0 calc(16px + var(--sab));overscroll-behavior:contain;}
  .group-h{font-size:11px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--c,#0e7c86);padding:16px 16px 8px;display:flex;align-items:center;gap:8px;border-top:1px solid var(--line);}
  .group-h:first-child{border-top:none;}
  .group-h .gd{font-size:10px;color:var(--faint);font-weight:600;letter-spacing:.02em;text-transform:none;}
  .stop{
    display:grid;grid-template-columns:32px 1fr auto;align-items:center;gap:12px;
    width:100%;text-align:left;background:none;border:none;cursor:pointer;
    padding:12px 16px;color:var(--ink);border-bottom:1px solid var(--line);
  }
  .stop:hover{background:#f5f8f8;}
  .stop:active{background:#eef3f3;}
  .stop .num{
    width:32px;height:32px;border-radius:50%;background:var(--c,#0e7c86);color:#fff;
    display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;
    font-variant-numeric:tabular-nums;flex:none;
  }
  .stop .num.stay{border-radius:var(--r-sm);}
  .stop .num.skip{background:transparent;border:1.5px dashed var(--line-2);color:var(--faint);}
  .stop .num.optional{opacity:.5;}
  .stop .nm{display:block;font-size:14.5px;font-weight:600;letter-spacing:-.01em;line-height:1.3;}
  .stop.is-skip .nm{color:var(--faint);text-decoration:line-through;text-decoration-color:var(--line-2);font-weight:500;}
  .stop .ty{display:block;font-size:12px;color:var(--muted);margin-top:4px;line-height:1.35;text-wrap:pretty;}
  .stop .right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;}
  .dur{font-family:var(--mono);font-size:11px;color:var(--faint);font-variant-numeric:tabular-nums;white-space:nowrap;}
  .time{font-family:var(--mono);font-size:11px;font-weight:700;color:var(--hot);background:var(--hot-soft);padding:4px 8px;border-radius:var(--r-sm);white-space:nowrap;}
  .stop .nomap{color:var(--faint);font-size:10.5px;}

  /* leading drive row */
  .drive-row{
    display:grid;grid-template-columns:32px 1fr auto;align-items:center;gap:12px;
    padding:8px 16px;background:var(--chip);
  }
  .drive-ic{width:32px;display:flex;align-items:center;justify-content:center;color:var(--c,#0e7c86);flex:none;}
  .drive-ic svg{width:18px;height:18px;opacity:.85;}
  .drive-tx{font-size:12.5px;color:var(--muted);}
  .drive-tx b{color:var(--ink);font-weight:600;}
  .drive-dur{font-family:var(--mono);font-size:11px;color:var(--faint);font-variant-numeric:tabular-nums;white-space:nowrap;}
  .list > :last-child{border-bottom:none;}
</style>
</head>
<body>

<div id="map" role="application" aria-label="Trip map"></div>

<header id="topbar" class="hidden">
  <div class="tb-row">
    <button class="tb-home" id="homeBtn" aria-label="Back to all days">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
      Days
    </button>
    <div class="tb-title" id="tbTitle">
      <div class="tt-1" id="tbEyebrow">Everything</div>
      <div class="tt-2" id="tbSub">All 6 days</div>
    </div>
  </div>
  <div class="pills" id="pills" role="tablist" aria-label="Choose a day"></div>
</header>

<section id="sheet" class="hidden" aria-label="Stops">
  <button class="sheet-grip" id="grip" aria-label="Expand or collapse the list" aria-expanded="false"></button>
  <div class="sheet-head" id="sheetHead">
    <div class="sh-row">
      <div class="sh-titles">
        <div class="sh-eyebrow" id="shEyebrow">Everything</div>
        <div class="sh-title" id="shTitle">The whole trip</div>
      </div>
      <a class="navbtn" id="navBtn" target="_blank" rel="noopener" hidden>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l19-9-9 19-2-8-8-2z"/></svg>
        Drive
      </a>
    </div>
    <div class="sh-stats" id="shStats"></div>
  </div>
  <div id="noteSlot"></div>
  <div class="list" id="list"></div>
</section>

<section id="landing">
  <div class="land-wrap">
    <h1>Iceland</h1>
    <div class="sub"><b>30 Jun – 5 Jul 2026</b></div>

    <div class="btns">
      <button class="btn-all" data-go="everything">
        <span class="ba-t">Everything</span>
      </button>
      <div class="grid" id="dayGrid"></div>
    </div>

    <div class="land-foot">
      <a href="itinerary/">View the day-by-day list →</a>
    </div>
  </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"
  integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script>
"use strict";

const CAR_SVG='<svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M18.92 6.01C18.72 5.42 18.16 5 17.5 5h-11c-.66 0-1.21.42-1.42 1.01L3 12v8c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1h12v1c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-8l-2.08-5.99zM6.5 16c-.83 0-1.5-.67-1.5-1.5S5.67 13 6.5 13s1.5.67 1.5 1.5S7.33 16 6.5 16zm11 0c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zM5 11l1.5-4.5h11L19 11H5z"/></svg>';

/* ---------------- DATA ---------------- */
const DAYS = [
  {id:"day1", n:1, dow:"Tue", date:"30 Jun", region:"Reykjanes &amp; Reykjavík", color:"var(--d1)", hex:"#0e7c86",
   drive:"", window:"", booked:"Check-in 15:00",
   note:{type:"plain", h:"Only fixed point", t:"Check-in <b>from 15:00</b> (paid) — the rest of the day is flexible."}},
  {id:"day2", n:2, dow:"Wed", date:"1 Jul", region:"Golden Circle → Hella", color:"var(--d2)", hex:"#4c9a2a",
   drive:"~3.5h", window:"09:00–21:00", booked:"Silfra 10:30",
   note:{type:"hot", h:"Silfra booked — 10:30", t:"Be at the car park by <b>10:15</b>. It's ~1h from Reykjavík, so <b>leave by 09:00</b>."}},
  {id:"day3", n:3, dow:"Thu", date:"2 Jul", region:"South Coast → Vík", color:"var(--d3)", hex:"#1f6fb2",
   drive:"~2–2.5h", window:"09:00–19:00", booked:"",
   note:null},

/* ---------------- MAP SETUP ---------------- */
const map = L.map("map", {
  zoomControl:true, attributionControl:true, tap:true, minZoom:5, maxZoom:17,
  zoomSnap:.25, worldCopyJump:false
});
map.setView([64.3, -19.6], 6);

L.tileLayer("https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png", {
  subdomains:"abcd", maxZoom:19, detectRetina:false,
  attribution:'© <a href="https://www.openstreetmap.org/copyright">OSM</a> · © <a href="https://carto.com/attributions">CARTO</a>'
}).addTo(map);

const ICELAND_BOUNDS = L.latLngBounds([63.30, -22.95], [64.45, -15.9]);

/* layer groups, rebuilt on each selection */
let activeLayer = L.layerGroup().addTo(map);
const markerIndex = {}; // key -> marker, for list->map linking

/* ---------------- HELPERS ---------------- */
function isMapped(s){ return !s.nomap && s.kind!=="note" && typeof s.lat==="number"; }
function isRouted(s){ return isMapped(s) && s.kind!=="skip"; }
function dirUrl(s){ return "https://www.google.com/maps/dir/?api=1&destination=" + s.lat + "," + s.lng + "&travelmode=driving"; }

function pinHtml(num, s){
  let cls = "pin";
  if(s.kind==="stay") cls+=" is-stay";
  else if(s.kind==="start") cls+=" is-start";
  else if(s.kind==="skip") cls+=" is-skip";
  else if(s.kind==="optional") cls+=" is-optional";
  if(s.anchor) cls+=" is-anchor";
  const inner = (s.kind==="skip") ? "✕" : (s.kind==="stay" ? "" : (s.kind==="start" ? "▸" : num));
  return '<div class="'+cls+'" style="--c:'+s._hex+'"><span>'+inner+'</span></div>';
}

function popupHtml(s){
  let h = '<div class="pop-tag" style="color:'+s._hex+'">'+s.type+'</div>';
  h += '<div class="pop-name">'+s.name+'</div>';
  const meta = s.dur && s.dur!=="maybe skip" && s.dur!=="quick" ? s.dur : "";
  if(meta) h += '<div class="pop-meta">'+meta+'</div>';
  if(s.note) h += '<div class="pop-meta" style="margin-top:4px">'+s.note+'</div>';
  if(s.anchor) h += '<div class="pop-time">Fixed · '+s.anchor+'</div><br>';
  h += '<a class="pop-dir" href="'+dirUrl(s)+'" target="_blank" rel="noopener" style="color:'+s._hex+'">Directions</a>';
  return h;
}

function markerKey(dayId, idx){ return dayId+"_"+idx; }

/* ---------------- RENDER MAP FOR A SELECTION ---------------- */
function renderMap(sel){
  activeLayer.remove();
  activeLayer = L.layerGroup().addTo(map);
  for(const k in markerIndex) delete markerIndex[k];

  const dayIds = sel==="everything" ? DAYS.map(d=>d.id) : [sel];
  const allLatLng = [];

  dayIds.forEach(dayId=>{
    const day = DAYS.find(d=>d.id===dayId);
    const stops = TRIP[dayId];
    const routePts = [];
    let num = 0;

    stops.forEach((s, idx)=>{
      s._hex = day.hex;
      if(!isMapped(s)) return;
      if(isRouted(s)) num++;
      const label = isRouted(s) ? String(num) : "";
      const mk = L.marker([s.lat, s.lng], {
        icon: L.divIcon({ className:"", html: pinHtml(label, s), iconSize:[26,26], iconAnchor:[13,13], popupAnchor:[0,-15] }),
        zIndexOffset: s.anchor?1000:(s.kind==="stay"?500:0),
        keyboard:true, title:s.name
      });
      mk.bindPopup(popupHtml(s), {maxWidth:220, autoPanPadding:[28,120]});
      mk.addTo(activeLayer);
      markerIndex[markerKey(dayId, idx)] = mk;
      allLatLng.push([s.lat, s.lng]);
      if(isRouted(s)) routePts.push([s.lat, s.lng]);
    });

    if(routePts.length>1){
      L.polyline(routePts, {color:day.hex, weight:4, opacity:.62, dashArray:"2 9", lineCap:"round", lineJoin:"round"}).addTo(activeLayer);
    }
  });

  // fit bounds (leave room for the sheet at the bottom)
  if(allLatLng.length){
    const b = L.latLngBounds(allLatLng).pad(0.12);
    map.fitBounds(b, {paddingTopLeft:[24, 130], paddingBottomRight:[24, sheetPeekPx()+24], animate:false});
  } else {
    map.fitBounds(ICELAND_BOUNDS, {animate:false});
  }
}

/* ---------------- BUILD THE LIST ---------------- */
function buildList(sel){
  const list = document.getElementById("list");
  list.innerHTML = "";
  const dayIds = sel==="everything" ? DAYS.map(d=>d.id) : [sel];

  dayIds.forEach(dayId=>{
    const day = DAYS.find(d=>d.id===dayId);
    const stops = TRIP[dayId];

    if(sel==="everything"){
      const gh = document.createElement("div");
      gh.className = "group-h";
      gh.style.setProperty("--c", day.hex);
      gh.innerHTML = "Day "+day.n+" — "+day.region+' <span class="gd">'+day.dow+" "+day.date+"</span>";
      list.appendChild(gh);
    }

    let num = 0;
    stops.forEach((s, idx)=>{
      if(s.kind==="drive"){
        const dr=document.createElement("div");
        dr.className="drive-row"; dr.style.setProperty("--c", day.hex);
        dr.innerHTML='<span class="drive-ic">'+CAR_SVG+'</span><span class="drive-tx">Drive from <b>'+s.from+'</b></span><span class="drive-dur">'+s.dur+'</span>';
        list.appendChild(dr); return;
      }
      if(isRouted(s)) num++;
      const row = document.createElement(isMapped(s) ? "button" : "div");
      row.className = "stop" + (s.kind==="skip" ? " is-skip":"");
      row.style.setProperty("--c", day.hex);

      const numClass = s.kind==="stay"?"num stay":(s.kind==="skip"?"num skip":(s.kind==="optional"?"num optional":"num"));
      const numTxt = s.kind==="skip" ? "✕" : (s.kind==="stay" ? "■" : (isRouted(s)? num : "·"));

      const durHtml = s.anchor
        ? '<span class="time">'+s.anchor+'</span>'
        : (s.dur && s.dur!=="maybe skip" && s.dur!=="quick" ? '<span class="dur">'+s.dur+'</span>' : (s.nomap?'<span class="nomap">no pin</span>':''));

      row.innerHTML =
        '<span class="'+numClass+'" style="--c:'+day.hex+'">'+numTxt+'</span>'+
        '<span class="body"><span class="nm">'+s.name+'</span>'+
        (s.note ? '<span class="ty">'+s.note+'</span>' : '')+'</span>'+
        '<span class="right">'+durHtml+'</span>';

      if(isMapped(s)){
        row.type = "button";
        row.addEventListener("click", ()=>focusStop(dayId, idx, s));
      }
      list.appendChild(row);
    });
  });
}

/* ---------------- LIST ROW -> MAP ---------------- */
function focusStop(dayId, idx, s){
  const mk = markerIndex[markerKey(dayId, idx)];
  if(!mk) return;
  setSheet("peek");
  // offset target up so it isn't hidden behind the peeking sheet
  const targetZoom = Math.max(map.getZoom(), 11);
  const pt = map.project([s.lat, s.lng], targetZoom).subtract([0, sheetPeekPx()*0.42]);
  const center = map.unproject(pt, targetZoom);
  const reduced = window.matchMedia && window.matchMedia("(prefers-reduced-motion:reduce)").matches;
  map.flyTo(center, targetZoom, {duration: reduced ? 0 : .6});
  map.once("moveend", ()=>mk.openPopup());
  // fallback: if the map was already centred there, moveend never fires — open anyway
  setTimeout(()=>{ if(!mk.isPopupOpen()) mk.openPopup(); }, reduced ? 80 : 750);
}

/* ---------------- SHEET STATE ---------------- */
let sheetState = "peek"; // peek | full
function sheetPeekPx(){ return Math.round(window.innerHeight * 0.88 * 0.42); }
function setSheet(state){
  sheetState = state;
  const sheet = document.getElementById("sheet");
  const grip = document.getElementById("grip");
  sheet.style.setProperty("--sheet-y", state==="full" ? "0%" : "58%");
  grip.setAttribute("aria-expanded", state==="full" ? "true":"false");
  setTimeout(()=>map.invalidateSize({pan:false}), 360);
}

/* ---------------- HEADER + SHEET CONTENT ---------------- */
function setChrome(sel){
  const topbar = document.getElementById("topbar");
  const sheet = document.getElementById("sheet");
  topbar.classList.remove("hidden");
  sheet.classList.remove("hidden");

  const note = document.getElementById("noteSlot");
  const stats = document.getElementById("shStats");
  const navBtn = document.getElementById("navBtn");
  note.innerHTML = ""; stats.innerHTML = "";

  if(sel==="everything"){
    setVar("#0e7c86");
    txt("tbEyebrow","Everything"); txt("tbSub","All 6 days");
    txt("shEyebrow","Everything"); txt("shTitle","The whole trip");
    stat(stats,"Stops", String(countMapped()));
    navBtn.hidden = true;
    note.innerHTML = '<div class="note plain"><div class="nh">On the map</div>Dashed lines are the rough route, not turn-by-turn. Tap a stop to jump to it.</div>';
  } else {
    const day = DAYS.find(d=>d.id===sel);
    setVar(day.hex);
    txt("tbEyebrow","Day "+day.n);
    document.getElementById("tbSub").innerHTML = day.region;
    txt("shEyebrow","Day "+day.n+" · "+day.dow+" "+day.date);
    document.getElementById("shTitle").innerHTML = day.region;
    if(day.window) stat(stats,"Window",day.window);
    if(day.drive) stat(stats,"Driving",day.drive);
    if(day.booked){ const e=document.createElement("span"); e.className="stat"; e.innerHTML='<b>Booked</b>'+day.booked; e.style.background="var(--hot-soft)"; e.style.color="#7a3417"; stats.appendChild(e); }
    // navigate-this-day link
    const url = dayNavUrl(sel);
    if(url){ navBtn.hidden=false; navBtn.href=url; } else navBtn.hidden=true;
    // day note
    if(day.note){
      note.innerHTML = '<div class="note '+(day.note.type==="plain"?"plain":"")+'"><div class="nh">'+day.note.h+'</div>'+day.note.t+'</div>';
    }
  }
}
function setVar(hex){
  document.getElementById("tbTitle").style.setProperty("--c", hex);
  document.getElementById("topbar").style.setProperty("--c", hex);
  document.getElementById("sheet").style.setProperty("--c", hex);
  document.querySelector(":root").style.setProperty("--accent", hex);
}
function txt(id,t){ document.getElementById(id).textContent = t; }
function stat(box,label,val){ const e=document.createElement("span"); e.className="stat"; e.innerHTML='<b>'+label+'</b>'+val; box.appendChild(e); }
function countMapped(){ let n=0; DAYS.forEach(d=>TRIP[d.id].forEach(s=>{if(isMapped(s))n++;})); return n; }

function dayNavUrl(dayId){
  const pts = TRIP[dayId].filter(isRouted);
  if(pts.length<2) return null;
  const origin = pts[0], dest = pts[pts.length-1];
  const mids = pts.slice(1,-1).slice(0,9).map(p=>p.lat+","+p.lng).join("|");
  let u = "https://www.google.com/maps/dir/?api=1&travelmode=driving";
  u += "&origin="+origin.lat+","+origin.lng;
  u += "&destination="+dest.lat+","+dest.lng;
  if(mids) u += "&waypoints="+encodeURIComponent(mids);
  return u;
}

/* ---------------- PILLS ---------------- */
function buildPills(){
  const pills = document.getElementById("pills");
  pills.innerHTML = "";
  const mk = (id,label,hex,routeId)=>{
    const b = document.createElement("button");
    b.className="pill"; b.setAttribute("role","tab");
    b.style.setProperty("--c", hex);
    b.dataset.go = routeId;
    b.innerHTML = (hex?'<span class="dot"></span>':'')+label;
    b.addEventListener("click", ()=>go(routeId));
    pills.appendChild(b);
  };
  mk("all","All","", "everything");
  DAYS.forEach(d=> mk(d.id, String(d.n), d.hex, d.id));
}
function syncPills(sel){
  document.querySelectorAll("#pills .pill").forEach(p=>{
    p.setAttribute("aria-current", p.dataset.go===sel ? "true":"false");
  });
}

/* ---------------- LANDING ---------------- */
function buildLanding(){
  const grid = document.getElementById("dayGrid");
  grid.innerHTML = "";
  DAYS.forEach(d=>{
    const b = document.createElement("button");
    b.className="day-btn"; b.style.setProperty("--c", d.hex);
    b.dataset.go = d.id;
    let chips = "";
    if(d.window) chips += '<span class="chip">'+d.window+'</span>';
    if(d.drive) chips += '<span class="chip">Drive '+d.drive+'</span>';
    if(d.booked) chips += '<span class="chip hot">'+d.booked+'</span>';
    b.innerHTML =
      '<span class="db-badge">'+d.n+'</span>'+
      '<span class="db-main">'+
        '<span class="db-title">'+d.region+'</span>'+
        (chips ? '<span class="db-meta">'+chips+'</span>' : '')+
      '</span>'+
      '<span class="db-chev" aria-hidden="true"></span>';
    b.addEventListener("click", ()=>go(d.id));
    grid.appendChild(b);
  });
  document.querySelectorAll("[data-go]").forEach(el=>{
    if(el.classList.contains("day-btn")) return;
    el.addEventListener("click", ()=>go(el.dataset.go));
  });
}

/* ---------------- ROUTER ---------------- */
const VALID = new Set(["everything", ...DAYS.map(d=>d.id)]);
function go(sel){ location.hash = "#"+sel; }
function showLanding(){
  document.querySelector(":root").style.setProperty("--accent", "#0e7c86");
  document.getElementById("landing").classList.remove("hidden");
  document.getElementById("topbar").classList.add("hidden");
  document.getElementById("sheet").classList.add("hidden");
}
function route(){
  const sel = location.hash.replace(/^#/,"");
  if(!VALID.has(sel)){ showLanding(); return; }
  document.getElementById("landing").classList.add("hidden");
  setChrome(sel);
  buildList(sel);
  setSheet("peek");
  syncPills(sel);
  // render synchronously — the map container is always full-screen, so we don't need to
  // wait for a paint frame, and rAF can be throttled (backgrounded tab / rapid switches),
  // which would leave the map frozen on the previous day while the list updates.
  map.invalidateSize({pan:false});
  renderMap(sel);
}

/* ---------------- SHEET DRAG ---------------- */
function initSheetDrag(){
  const sheet = document.getElementById("sheet");
  const grip = document.getElementById("grip");
  // the whole top region is a drag handle: grip + header (title/stats) + note
  const handles = [grip, document.getElementById("sheetHead"), document.getElementById("noteSlot")];
  let dragging=false, startY=0, startPct=58, moved=false, vh=0, capEl=null, lastY=0, lastT=0, vel=0;
  const statePct = ()=> sheetState==="full" ? 0 : 58;

  function onDown(e){
    // let the Drive button / any link work normally — don't start a drag on them
    if(e.target.closest && e.target.closest("a, button:not(.sheet-grip)")) return;
    dragging=true; moved=false; vh=window.innerHeight;
    startY=e.clientY; startPct=statePct();
    lastY=e.clientY; lastT=performance.now(); vel=0;
    sheet.classList.add("dragging");
    capEl=e.currentTarget;
    if(capEl.setPointerCapture) try{ capEl.setPointerCapture(e.pointerId); }catch(_){}
  }
  function onMove(e){
    if(!dragging) return;
    const now=performance.now(), dy=e.clientY-startY;
    if(Math.abs(dy)>5) moved=true;
    if(now>lastT) vel=(e.clientY-lastY)/(now-lastT);   // px/ms, + = downward
    lastY=e.clientY; lastT=now;
    const pct=Math.max(0, Math.min(72, startPct + dy/vh*100));
    sheet.style.setProperty("--sheet-y", pct+"%");
    if(e.cancelable) e.preventDefault();
  }
  function end(){
    if(!dragging) return;
    dragging=false; sheet.classList.remove("dragging");
    if(!moved){ setSheet(sheetState==="full" ? "peek" : "full"); return; }   // plain tap toggles
    const cur=parseFloat(getComputedStyle(sheet).getPropertyValue("--sheet-y"))||0;
    if(vel>0.6 && cur>50){ location.hash=""; return; }   // hard fling down → back to all days
    if(vel<-0.5){ setSheet("full"); return; }            // flick up → expand
    if(vel>0.5){ setSheet("peek"); return; }             // flick down → collapse
    setSheet(cur < 29 ? "full" : "peek");                // otherwise snap by position
  }
  handles.forEach(h=>{
    if(!h) return;
    h.addEventListener("pointerdown", onDown);
    h.addEventListener("pointermove", onMove);
    h.addEventListener("pointerup", end);
    h.addEventListener("pointercancel", end);
  });
  grip.addEventListener("keydown",(e)=>{ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); setSheet(sheetState==="full"?"peek":"full"); }});
}
